      new sap.ui.core.Item({ key: RC_COND.FROM_ZERO,    text: 'From Zero' }),
      new sap.ui.core.Item({ key: RC_COND.CUSTOM_VALUE, text: 'Custom value' }),
      new sap.ui.core.Item({ key: RC_COND.AFTER,        text: 'After...' }),
      new sap.ui.core.Item({ key: RC_COND.WITH,         text: 'With ...' }),
      new sap.ui.core.Item({ key: RC_COND.SEQUENTIAL,   text: 'Sequential' }),
      new sap.ui.core.Item({ key: RC_COND.SYNC_START,   text: 'Sync Start' })
    ],
    change: function (oEvent) { onStartConditionChanged(oEvent.getParameter('selectedItem').getKey()); }
  });

  var oRcStartValueInput = new sap.m.StepInput({
    tooltip: 'Custom Start Time (s)', value: 0, min: 0, step: 0.5,
    width: '115px',
    change: function () { this.setValueState('None'); applyRcChange('start', RC_COND.CUSTOM_VALUE, [oRcStartValueInput.getValue()], oRcStartOffsetInput.getValue()); }
  });
  var oRcStartValueRow = new sap.m.HBox({
    visible: false,
    items: [ new sap.m.Label({ text: 'Value:', width: '52px' }), oRcStartValueInput ]
  });

  var oRcStartOffsetInput = new sap.m.StepInput({
    tooltip: 'Start Offset (s)', value: 0, step: 0.5,
    width: '115px',
    change: function () {
      this.setValueState('None');
      var item = getCurrentItem(); if (!item) return;
      var rc = parseRC(item.run_cond_config);
      if (rc.start && rc.start.condition)
        applyRcChange('start', rc.start.condition, rc.start.values, oRcStartOffsetInput.getValue());
    }
  });
  var oRcStartOffsetRow = new sap.m.HBox({
    items: [ new sap.m.Label({ text: 'Offset:', width: '52px' }), oRcStartOffsetInput ]
  });

  var oRcStartCheck = new sap.m.CheckBox({
    selected: true, text: 'Start Phase',
    select: function (oEvent) { onPhaseCheckChanged('start', oEvent.getParameter('selected')); }
  });
  var oRcStartPanel = new sap.m.Panel({
    expandable: false, backgroundDesign: 'Transparent',
    headerToolbar: new sap.m.Toolbar({ style: 'Clear', content: [ oRcStartCheck ] }),
    content: [ new sap.m.VBox({ items: [ oRcStartSelect, oRcStartValueRow, oRcStartOffsetRow ] }) ]
  }).addStyleClass('vtRcPanel');

  // ── Cycle Phase ───────────────────────────────────────────────────────────
  var oRcCycleSelect = new sap.m.Select({
    width: '100%',
    items: [
      new sap.ui.core.Item({ key: '',                    text: '—' }),
      new sap.ui.core.Item({ key: RC_COND.CUSTOM_VALUE, text: 'Custom value' }),
      new sap.ui.core.Item({ key: RC_COND.EQUAL_TO,     text: 'Equal to' })
    ],
    change: function (oEvent) { onCycleConditionChanged(oEvent.getParameter('selectedItem').getKey()); }
  });

  var oRcCycleValueInput = new sap.m.StepInput({
    tooltip: 'Cycle Time (s)', value: 10, min: 0, step: 0.5,
    width: '115px',
    change: function () { this.setValueState('None'); applyRcChange('cycle', RC_COND.CUSTOM_VALUE, [oRcCycleValueInput.getValue()], 0); }
  });
  oRcCycleValueInput.addEventDelegate({
    onfocusin: function () {
      oRcCycleValueInput.setValueState(sap.ui.core.ValueState.None);
      var inp = (oRcCycleValueInput.getDomRef() || {}).querySelector && oRcCycleValueInput.getDomRef().querySelector("input");
      if (inp) {
        inp.autocomplete = "off";
        if (inp.setCustomValidity) inp.setCustomValidity("");
        setTimeout(function () { inp.select(); }, 0);
      }
    }
  });
  var oRcCycleValueRow = new sap.m.HBox({
    visible: true,
    items: [ new sap.m.Label({ text: 'Value:', width: '52px' }), oRcCycleValueInput ]
  });

  var oRcCycleCheck = new sap.m.CheckBox({
    selected: true, text: 'Cycle Phase',
    select: function (oEvent) { onPhaseCheckChanged('cycle', oEvent.getParameter('selected')); }
  });
  var oRcCyclePanel = new sap.m.Panel({
    expandable: false, backgroundDesign: 'Transparent',
    headerToolbar: new sap.m.Toolbar({ style: 'Clear', content: [ oRcCycleCheck ] }),
    content: [ new sap.m.VBox({ items: [ oRcCycleSelect, oRcCycleValueRow ] }) ]
  }).addStyleClass('vtRcPanel');

  // ── End Phase ─────────────────────────────────────────────────────────────
  var oRcEndSelect = new sap.m.Select({
    width: '100%',
    items: [
      new sap.ui.core.Item({ key: '',                       text: '—' }),
      new sap.ui.core.Item({ key: RC_COND.LAST,            text: 'Last process' }),
      new sap.ui.core.Item({ key: RC_COND.CUSTOM_VALUE,    text: 'Custom value' }),
      new sap.ui.core.Item({ key: RC_COND.BEFORE,          text: 'Before ...' }),
      new sap.ui.core.Item({ key: RC_COND.WITH,            text: 'With ...' }),
      new sap.ui.core.Item({ key: RC_COND.SYNC_COMPLETION, text: 'Sync Completion' })
    ],
    change: function (oEvent) { onEndConditionChanged(oEvent.getParameter('selectedItem').getKey()); }
  });

  var oRcEndValueInput = new sap.m.StepInput({
    tooltip: 'Custom End Time (s)', value: 0, min: 0, step: 0.5,
    width: '115px',
    change: function () { this.setValueState('None'); applyRcChange('end', RC_COND.CUSTOM_VALUE, [oRcEndValueInput.getValue()], oRcEndOffsetInput.getValue()); }
  });
  var oRcEndValueRow = new sap.m.HBox({
    visible: false,
    items: [ new sap.m.Label({ text: 'Value:', width: '52px' }), oRcEndValueInput ]
  });

  var oRcEndOffsetInput = new sap.m.StepInput({
    tooltip: 'End Offset (s)', value: 0, step: 0.5,
    width: '115px',
    change: function () {
      this.setValueState('None');
      var item = getCurrentItem(); if (!item) return;
      var rc = parseRC(item.run_cond_config);
      if (rc.end && rc.end.condition)
        applyRcChange('end', rc.end.condition, rc.end.values, oRcEndOffsetInput.getValue());
    }
  });
  var oRcEndOffsetRow = new sap.m.HBox({
    items: [ new sap.m.Label({ text: 'Offset:', width: '52px' }), oRcEndOffsetInput ]
  });

  var oRcEndCheck = new sap.m.CheckBox({
    selected: false, text: 'End Phase',
    select: function (oEvent) { onPhaseCheckChanged('end', oEvent.getParameter('selected')); }
  });
  var oRcEndPanel = new sap.m.Panel({
    expandable: false, backgroundDesign: 'Transparent',
    headerToolbar: new sap.m.Toolbar({ style: 'Clear', content: [ oRcEndCheck ] }),
    content: [ new sap.m.VBox({ items: [ oRcEndSelect, oRcEndValueRow, oRcEndOffsetRow ] }) ]
  }).addStyleClass('vtRcPanel');

  // ── RC status bar: shown while waiting for a target-row click ─────────────
  var oRcStatusBar = new sap.m.Toolbar({
    style: 'Clear', visible: false,
    content: [
      oRcStatusLabel,
      new sap.m.ToolbarSpacer(),
      new sap.m.Button({ text: 'Apply', type: 'Emphasized', press: function () { commitRcWait(); } }),
      new sap.m.Button({ text: 'Cancel', type: 'Transparent', press: function () { cancelRcWait(); } })
    ]
  });

  // End phase is initially the derived phase — disable its controls at startup
  setPhaseControlsEnabled('end', false);

  // ── Add/Remove panel — lives at the left of the RC toolbar ───────────────
  var oAddRemovePanel = new sap.m.Panel({
    expandable: false, backgroundDesign: 'Transparent',
    content: [ new sap.m.VBox({
      alignItems: 'Center',
      items: [
        new sap.m.HBox({ items: [
          new sap.m.Button({ text: "▲ Add Above", type: "Accept",  tooltip: "Add Above",                   press: function () { addProcessAt(0); } }),
          new sap.m.Button({ text: "▼ Add Below", type: "Accept",  tooltip: "Add Below",                   press: function () { addProcessAt(1); } })
        ]}),
        new sap.m.HBox({ items: [
          new sap.m.Button({ icon: "sap-icon://org-chart", text: "Add Sub", type: "Accept", tooltip: "Add As Subprocess (Shift+P)", press: function () { addNewProcess(); } }),
          new sap.m.Button({ icon: "sap-icon://delete",    text: "Delete",  type: "Reject", tooltip: "Remove Process",             press: function () { removeProcess(); } })
        ]})
      ]
    }) ]
  }).addStyleClass('vtRcPanel vtRcAddRemovePanel');

  var oAddRemoveBox = new sap.m.VBox({
    alignItems: 'Center',
    items: [
      oAddRemovePanel,
      new sap.m.Label({ text: 'Add/Delete Process' }).addStyleClass('vtAddRemoveLabel')
    ]
  }).addStyleClass('vtRcAddRemoveBox');

  var oRcPhasesBox = new sap.m.VBox({
    alignItems: 'Center',
    items: [
      new sap.m.HBox({
        items: [ oRcStartPanel, oRcCyclePanel, oRcEndPanel ]
      }).addStyleClass('vtRcPhasesContainer'),
      new sap.m.Label({ text: 'Run Condition' }).addStyleClass('vtRcPhaseLabel')
    ]
  });

  // ── Copy/Paste/Confirm panel — lives at the right of the RC toolbar ────────
  var oCopyPastePanel = new sap.m.Panel({
    expandable: false, backgroundDesign: 'Transparent',
    content: [ new sap.m.HBox({
      alignItems: 'Stretch',
      items: [
        new sap.m.VBox({ justifyContent: 'Center', alignItems: 'Center', items: [
          new sap.m.Button({ icon: "sap-icon://copy",     type: "Default", tooltip: "Copy selected item(s)", press: function () { copyToClipboard(); } }),
          new sap.m.Button({ icon: "sap-icon://scissors", type: "Default", tooltip: "Cut selected item(s)",  press: function () { cutToClipboard(); } })
        ]}).addStyleClass('vtCPSection'),
        new sap.m.VBox({ justifyContent: 'Center', alignItems: 'Center', items: [
          new sap.m.Button({ icon: "sap-icon://org-chart", text: "Paste Sub",    type: "Default", tooltip: "Paste as subprocess of selected row",   press: function () { pasteFromClipboard('subprocess'); } }),
          new sap.m.Button({ text: "▲ Paste Above",        type: "Default", tooltip: "Paste clipboard above selected row",                           press: function () { pasteFromClipboard('above'); } }),
          new sap.m.Button({ text: "▼ Paste Below",        type: "Default", tooltip: "Paste clipboard below selected row",                           press: function () { pasteFromClipboard('below'); } })
        ]}).addStyleClass('vtCPSection'),
        new sap.m.VBox({ justifyContent: 'Center', alignItems: 'Center', items: [
          new sap.m.Button({ icon: "sap-icon://accept", text: "Confirm", type: "Default", tooltip: "Remove (**copy) prefix from selected item(s) and subprocesses", press: function () { confirmCopiedItems(); } })
        ]}).addStyleClass('vtCPSection')
      ]
    }) ]
  }).addStyleClass('vtRcPanel vtRcAddRemovePanel vtCopyPastePanel');

  var oCopyPasteBox = new sap.m.VBox({
    alignItems: 'Center',
    items: [
      oCopyPastePanel,
      new sap.m.Label({ text: 'Copy/Move' }).addStyleClass('vtAddRemoveLabel')
    ]
  }).addStyleClass('vtRcAddRemoveBox');

  // ── RC section: three GroupBox-style panels + status bar ─────────────────
  var oRcToolbar = new sap.m.VBox({
    width: '100%',
    items: [
      new sap.m.FlexBox({ wrap: 'Wrap', alignItems: 'Stretch', width: '100%',
        items: [ oAddRemoveBox, oRcPhasesBox, new sap.m.ToolbarSpacer(), oCopyPasteBox ]
      }),
      oRcStatusBar
    ]
  }).addStyleClass('vtRcToolbar');

  // ── Tree Design Toolbar ───────────────────────────────────────────────────
  var oTreeDesignToolbar = new sap.m.Toolbar({
    style: "Standard",
    content: [
      new sap.m.Label({ text: "Scale:" }),
      new sap.m.ToolbarSpacer({ width: "6px" }),
      oSlider,
      new sap.m.ToolbarSpacer({ width: "6px" }),
      oScaleLabel,
      new sap.m.ToolbarSeparator(),
      new sap.m.Button({
        icon:    "sap-icon://expand-all",
        type:    "Transparent",
        tooltip: "Expand All",
        press:   function () { oTable.expandToLevel(5); }
      }),
      new sap.m.Button({
        icon:    "sap-icon://collapse-all",
        type:    "Transparent",
        tooltip: "Collapse All",
        press:   function () { oTable.collapseAll(); }
      }),
      new sap.m.ToolbarSpacer(),
      legendItem("brown",   "Station"),
      legendItem("#1A7FC4", "Process group"),
      legendItem("#4BA9E0", "Step"),
      new sap.m.ToolbarSpacer({ width: "8px" })
    ]
  });

  // ── Design Tab: FixFlex so table fills remaining height ───────────────────
  var oDesignLayout = new sap.ui.layout.FixFlex({
    vertical:    true,
    fixContent:  [oJobToolbar, oRcToolbar, oTreeDesignToolbar],
    flexContent: oTable
  });

  // ── Tab Bar ───────────────────────────────────────────────────────────────
  var oIconTabBar = new sap.m.IconTabBar({
    expandable:           false,
    stretchContentHeight: true,
    selectedKey:          "design",
    items: [
      new sap.m.IconTabFilter({
        key: "home", text: "Home",
        content: [new sap.ui.core.HTML({
          content:         '<div style="padding:48px;color:#aaa;font-family:72,Arial,sans-serif;font-size:15px;">Home — coming soon</div>',
          sanitizeContent: false
        })]
      }),
      new sap.m.IconTabFilter({
        key: "design", text: "Design",
        content: [oDesignLayout]
      }),
      new sap.m.IconTabFilter({
        key: "plots", text: "Plots",
        content: [new sap.ui.core.HTML({
          content:         '<div style="padding:48px;color:#aaa;font-family:72,Arial,sans-serif;font-size:15px;">Plots — coming soon</div>',
          sanitizeContent: false
        })]
      }),
      new sap.m.IconTabFilter({
        key: "reports", text: "Reports",
        content: [new sap.ui.core.HTML({
          content:         '<div style="padding:48px;color:#aaa;font-family:72,Arial,sans-serif;font-size:15px;">Reports — coming soon</div>',
          sanitizeContent: false
        })]
      })
    ],
    select: function (oEvent) {
      if (oEvent.getParameter("key") === "design") {
        setTimeout(function () { oTable.invalidate(); }, 0);
      }
    }
  });

  // ── Page / App ────────────────────────────────────────────────────────────
  var oPage = new sap.m.Page({
    title:         "ValiantTMS — Cycle Chart Management",
    showNavButton: false,
    headerContent: [
      new sap.ui.core.HTML({
        content:         '<img src="https://www.valianttms.com/wp-content/uploads/2021/09/valianttms-logo-298x92-1.png" height="36" style="vertical-align:middle;display:block;" />',
        sanitizeContent: false
      })
    ],
    content: [oIconTabBar]
  });

  new sap.m.App({ pages: [oPage] }).placeAt("content");

  // ── Global keyboard + background-click handlers ───────────────────────────
  // Capture phase fires before SAPUI5 processes the click, so __vtOnItemClick
  // can read _ctrlKeyHeld reliably.
  document.addEventListener('click', function (e) { _ctrlKeyHeld = e.ctrlKey; }, true);

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && oRcState.waitPhase) { e.preventDefault(); commitRcWait(); return; }
    if (e.key === 'Escape') {
      if (oRcState.waitPhase) { cancelRcWait(); }
      else { clearRowHighlight(); }
    }
    if (e.shiftKey && e.key === 'P') { e.preventDefault(); addNewProcess(); }
  });

  document.addEventListener('click', function (e) {
    // Row click already handled by __vtOnItemClick — skip this tick
    if (_rowClickHandled) { _rowClickHandled = false; return; }
    if (!oRcState.activeItemIds.length && !oRcState.waitPhase) return;
    // Only clear when clicking INSIDE the table body (not toolbars, RC panels, or any overlay
    // popup — SAPUI5 Select/Popover overlays are appended to <body>, outside the table DOM)
    var tableDom = oTable.getDomRef ? oTable.getDomRef() : null;
    if (!tableDom || !tableDom.contains(e.target)) return;
    // Don't clear when clicking on an actual data row
    if (e.target.closest('tr.sapUiTableRow')) return;
    clearRowHighlight();
  });

  // Initial ruler render, then load data
  updateRuler();
  loadOpNumbers();
});
</script>
</body>
</html>
